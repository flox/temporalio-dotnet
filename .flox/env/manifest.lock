      "DOTNET_NOLOGO": "1",
      "TEMPORAL_ADDRESS": "localhost:7233",
      "TEMPORAL_UI_PORT": "8233"
    },
    "hook": {
      "on-activate": "  if [ -f \"$FLOX_ENV_PROJECT/Temporalio.sln\" ]; then\n    cd \"$FLOX_ENV_PROJECT\"\n    dotnet restore --verbosity quiet 2>/dev/null || true\n  fi\n"
    },
    "options": {
      "systems": [
        "aarch64-darwin",
        "x86_64-darwin",
        "x86_64-linux",
        "aarch64-linux"
      ]
    },
    "services": {
      "temporal-dev": {
        "command": "temporal server start-dev --port 7233 --ui-port 8233 --db-filename $FLOX_ENV_CACHE/temporal-dev.db"
      }
    }
